## A few useful things about phylogenies

- Phylogenies are imperfect: it is a statistical estimate of the true history

--

- Trees have: "branches" and "nodes" (branch lengths can be meaningful or not)

--

- Nodes in a phylogeny can be named (e.g., Myrtaceae) or un-named.  So all taxonomy is the naming of the nodes on a tree

--

- Traits evolve along particular branches (we usually can't tell where on a given branch) 

--

- Systematists are always improving phylogenies (we'll teach you the current understanding, but it *will* change)

--

- Phylogenies are still useful even if they only contain a subset of species

# Take Home Messages
           
- A phylogeny is a data-based estimate of the true evolutionary history

- Sources of data to build a phylogeny are DNA and fossils

- Units can be either time ("time-tree") OR amount of change (esp in DNA code)

- Taxonomists are always improving phylogenies (we'll teach you the current understanding, but it *will* change)

- Nodes in a phylogeny can be named (e.g., Myrtaceae) or un-named.  So all taxonomy is a subset of phylogenetics.

- Families (named nodes) are a useful filing cabinet for learning plant (and food) diversity
