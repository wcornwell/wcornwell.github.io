.left-column[
## What is version control?
]
.right-column[
           
- A temporal filing cabinet for research projects 

- A collaborative tool
           
- Directional (but reversible) research .red[*]

<img src="http://www.phdcomics.com/comics/archive/phd101212s.gif" alt="Drawing" style="width: 300px;"/>
           
.footnote[.red[*] Not on auto-pilot; you have to think to use it!]
]
---
layout: false
.left-column[
## What does it do?
]
.right-column[
           
- Backup and restore 

- Synchronize among multiple computers
           
- Long- (or short-) term undo 
           
- Track changes, ownership, and allocate ~~blame~~ credit
           
- Record your own logic
           
- Distribute science: code, manuscripts, and data
      
]           
           
---
           
## A temporal filing cabinet of hidden files

 <img src="http://version-control.net/wp-content/uploads/2011/03/version-control-edit-commit.png" alt="Drawing" style="width: 800px;"/>    

All that you see on your computer is the current (hopefully best) version

## Cloud respositories

-Just another computer that no one uses but everyone can acccess, can be public or private, can have some added bells and whistles
           
-People who offer cloud git respositiories: Github, Bitbucket, UNSW
           
-At a core level no difference between different cloud servers: from the command line all git is the same 

-Different bells and whistles among repositories: 
           
              Bitbucket has free private repositories; 
              Github has a lot of cool add-ons like pages; 
              Both have diff viewers, issue trackers, and lots of help pages
<img src="https://s3-ap-northeast-1.amazonaws.com/opentutorialsfile/module/153/695.png" alt="Drawing" style="width: 200px;"/> 
.footnote[Go to [github](https://github.com) or [bitbucket](https://bitbucket.com)]
---
layout: false
.left-column[
## Version control in practice: establish linked repositories
]
.right-column[

- Locally do everything in bash (=shell).red[*]; on the web it's all push buttons

- Create a repository: *git init* or push buttons on webpage

- Connect repositories: *git clone* or push buttons on webpage

.footnote[.red[*] GUI's are coming (including in RStudio) but aren't there yet]
]    
           
---
layout: false
.left-column[
## Version control in practice: Normal work flow
]
.right-column[

1. *git pull* 

2. DO SOMETHING USEFUL 

3. STOP AT A LOGICAL STOPPING POINT FOR YOUR WORK

4. *git add \**

5. *git commit -m "informative commit message describing what you did and why"*

6. *git push*
           
           
.footnote[.red[*] Git pull not necessary if it's only you working on something]
]    
           
---
layout: false
.left-column[
## Limitations (probably for the next 5 years or so)
]
.right-column[

-Big data files are tricky at the moment

-No GUI so some learning required for collaborations
           
-Binary files--files that cannot be opened in a text editor (.docx, .xlsx, .pptx, and others)--are tricky
           
-Multi-person work flow is a seperate problem from version control--you still need to talk to each other
           
] 
---

]
.right-column[

-*git status*

-*git diff*
