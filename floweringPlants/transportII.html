## The answers
]
.right-column[   
- How old are flowering plants?
           -Land plants 477 million years ago (407-557)
           -Seed plants 327 million years ago (296-356) 
           -Flowering plants 217 million years ago (182-257) 
           
- How many species are there (current estimates)?
           -Land plants 350,699 
           -Angiosperms 304,419 
           
- What are the important groups?
           -Ferns and fern allies (Monilophytes)
           -Gymnosperms
           -Bryophytes
           -Angiosperms
                -"Basal angiosperms"
                -Monocots
                -Eudicots
           
           Estimates from Smith et al. 2010 
           and The Plant List v1.1
