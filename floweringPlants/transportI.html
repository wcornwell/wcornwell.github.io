#Features of the pipes: vessels versus tracheids

### Differences between trachedis (all vascular plants) and vessels (special cell only in 99% angiosperms)

### Max diameter of the vessel is bigger.  This matters a lot!  See Hagen-Poiseuille equation (Resistance ~ diameter<sup>4</sup>)
           
### Stackable: vessel elements can stack without the water going through pits

### Bigger elements, in general, are more susceptible to *embolism*
