### Practical tricks to knowing what kind of flower you have

Very approximate rules for the big three groups: 

1. Basal Angiosperms (many parts in each whorl)

2. Monocots (3/6 parts per whorl) 

3. Eudicots (4/5 parts per whorl)

### A few terms

- All the petals = "corola"

- All the sepals = "calyx"

- Things that are in between petals and sepals = "tepals"

- Radially symmetric = actinomorphic

- Bilaterally symmetric = zygomorphic

- Many flowers together = inflorescence
