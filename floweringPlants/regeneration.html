# The paradox of diversity

<img src="http://www.snh.org.uk/publications/on-line/heritagemanagement/erosion/images/plate-11.jpg
" alt="Drawing" style="width: 500px;"/>

---
.left-column[
## A few observations about diversity

]
.right-column[

### Some clades are more diverse than others, even with the same amount of evolutionary time:

```remark
# Angiosperms
304,419 species*

---

# Gymnosperms
1,104 species*
```
### Some places are more diverse than others, even with the same number of individuals:

```remark
1 ha of the Yasuni forest in, Equador, there are 644 tree species

---

1 ha of British Columbia, Canada, there are 2 tree species
```
]

---

.left-column[
## Explanations fall into two categories

]
.right-column[

1. Evolution (assuming all species are similar ecologically is sometimes called "neutral")

2. Ecological "niche" differences

]

## Ecological niche differences

### All plants use the same resources (nutrients, water, light, space) but there still may be spatial or temporal specialization ("niches") in the uptake and use of these resources

<img src="
http://www.nature.com/scitable/content/ne0000/ne0000/ne0000/ne0000/97971735/fig2-rev_1_2.png
" alt="Drawing" style="width: 750px;"/>

---

##Importance of the regneration niche (Grubb 1977)

	When an individual dies, it may or may not be replaced by an individual of the same species. 

<img src="
http://images.publicradio.org/content/2012/09/06/20120906_pagami-tour2_53.jpg
" alt="Drawing" style="width: 500px;"/>

	Difference in who wins at that key moment is what matters

---
 

## 5 Different regeneration traits that may promote co-existence, despite adult plants using the same resources (*sensu* Gause's competitive exclusion principle)

--

1. Production of viable seed (including the sub-stages of flowering, pollination and seed-set),

--

2. dispersal, in space and time,

--

3. germination,

--

4. establishment, and

--

5. further development of the immature plant.

# Important concepts

--

1. Competitive exclusion principle (Gause)

--

2. Niche in space and time (versus "neutral" processes)

--

3. Regeneration niche (Grubb 1977)

--

	- Pulses of resources, especially in deserts

--
	- Fire dynamics (depends on intensity / timing of the fire)

--

	- Tree fall gaps in forest ecosystems
