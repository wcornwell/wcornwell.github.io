# All community ecology explanations fall into 4 (and only 4) categories

--

## 1. *Speciation* --- 3 species becomes 4 species

--

## 2. *Dispersal* (immigration) --- An individual arrives from somewhere else

--

## 3. *Drift* --- random increase or decrease in a population

--

## 4. *Selection* --- non-random or "deterministic" increase or decrease in a population

## Ecological niche differences

All plants use the same resources (nutrients, water, light, space) but there still may be spatial or temporal specialization ("niches") in the uptake and use of these resources

<img src="
http://www.nature.com/scitable/content/ne0000/ne0000/ne0000/ne0000/97971735/fig2-rev_1_2.png
" alt="Drawing" style="width: 750px;"/>


---

##Importance of the regneration niche (Grubb 1977)

	When an individual dies, it may or may not be replaced by an individual of the same species. 

<img src="
http://images.publicradio.org/content/2012/09/06/20120906_pagami-tour2_53.jpg
" alt="Drawing" style="width: 500px;"/>

	Difference in who wins at that key moment is what matters
