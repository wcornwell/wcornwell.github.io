.left-column[
### Practical tricks to knowing what kind of flower you have
]
.right-column[

- Grasses (Poaceae), sedges (Cyperaceae), and rushes (Juncaceae) are weird
        -Juncaceae is actually not weird
           just tiny regular flowers
        -Poacceae and Cyperaceae are so weird 
           they have their own terms
           
- Orchids (Orchidaceae) are even weirder
           -Just use the pictures
           
- Basal angiosperms often have many repeated parts (think of a lily pad)

- Radially or bilaterially 

- 3/6 versus 4/5 parts is a decent clue

- Inflorescence type is also a decent clue
           
- Don't get fooled by compound flowers
           
]
