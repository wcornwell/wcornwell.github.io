## Diversity has different components

  - Diversity may be thought of as: 
      - Taxonomic: e.g. number of species

      - Genetic: e.g. number of alleles

      - Phylogenetic: e.g. number of years of evolutionary history

      - Functional: e.g. number of functions

  - All have alpha, beta, and gamma components

  - All have within trophic and among trophic level components

## Features of a useful ecosystem classification:
           -simple enough to be useful in mapping, thinking, and planning
           
           -capture something measurable (esp. "functional") about the organisms on the ground

           -designed well for the "extent" of the study or plan
           
           -consistently "lumped" or "split"
           
           -useful for "ecosystem-level conservation planning"
