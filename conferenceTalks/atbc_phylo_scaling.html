  ## The math of Brownian motion
]
           
.right-column[
           
           $$\frac{\partial\rho}{\partial t}=\sigma^2\frac{\partial^2\rho}{\partial x^2}$$
           <img src="http://upload.wikimedia.org/wikipedia/commons/d/d3/Albert_Einstein_Head.jpg" alt="Drawing" style="width:150px" align="center"/>

           
           the mean displacement is therefore proportional to 
           the square root (*Quadratwurzel*) of the time 
           -Einstein 1905 (see also Felsenstein 1985)
           
           ]

.left-column[
           
##In conclusion
]
           
.right-column[
           
- Brownian model does NOT predict linear phylogenetic-functional distance relationship 
           
- An evolutionary distance of 1 - 6 million years is larger than a difference of 101 - 106 million years
           
- At large phylogenetic scales heterogeneity is likely the rule not the exception
           
- Among the current "simple" models OU is usually a better fit than Brownian, implying a more sharply curvi-linear relationship
        
           ]
