##A bit more phylo-background
           
- A phylogeny is a statistical estimate of the true history

- Sources of data to build a phylogeny are fossils and DNA

- Units can be either time ("time-tree") OR amount of change (esp in DNA code)

- Taxonomists are always improving phylogenies (we'll teach you the current understanding, but it *will* change)

- Nodes in a phylogeny can be named (e.g., Myrtaceae) or un-named.  So all taxonomy is a subset of phylogenetics.

# Take Home Messages
           
- A phylogeny is a data-based estimate of the true evolutionary history

- Sources of data to build a phylogeny are DNA and fossils

- Units can be either time ("time-tree") OR amount of change (esp in DNA code)

- Taxonomists are always improving phylogenies (we'll teach you the current understanding, but it *will* change)

- Nodes in a phylogeny can be named (e.g., Myrtaceae) or un-named.  So all taxonomy is a subset of phylogenetics.

- Families (named nodes) are a useful filing cabinet for learning plant (and food) diversity
