## Water use strategies for a high vapour pressure deficit world

- CAM (Crassulaceaen Acid Metabolism)

- Stem and root capacitance (storing water when it's available)

- Seed dormancy

- Very deep roots / very rare regeneration opportunities

- Saline and/or chemically strange environments are common
