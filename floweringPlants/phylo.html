##A bit more phylo-background
           
-A phylogeny is a statistical estimate of the truth

-Sources of data to build a phylogeny are fossils and DNA

-Units can be either time ("time-tree") OR amount of change (esp in DNA code)

-Taxonomists are always improving phylogenies
           
-Familes are useful to use as an organizing idea but they are very different ages (completely artificial point on the tree)
