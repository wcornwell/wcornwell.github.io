  ## What is an ecosystem?

]
.right-column[
           
- *Population*: Interacting individuals of the same species
           
- *Community*: Interacting populations of different species

- *Ecosystem*: Communities and the environment where they live

           ]

## Features of a useful ecosystem classification:
           -simple enough to be useful in mapping, thinking, and planning
           
           -capture something measurable about the organisms on the ground

           -designed well for the "extent" of the study or plan
           
           -consistently "lumped" or "split"
           
           -useful for "ecosystem-level conservation planning"
